<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F0F4FA;color:#1a1f36;font-size:14px;line-height:1.5;min-height:100vh}
:root{--blue:#1E4B8F;--green:#2A9D6F;--red:#DC2626;--bd:#E2E6F0;--r:10px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.animate{animation:fadeIn .2s ease both}
.spinner{width:30px;height:30px;border:3px solid #E2E6F0;border-top-color:#1E4B8F;border-radius:50%;animation:spin .7s linear infinite}
input,select,textarea{font-family:inherit;font-size:14px;width:100%;padding:9px 12px;border:1.5px solid #E2E6F0;border-radius:10px;color:#1a1f36;background:#F8FAFD;outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:#1E4B8F;background:#fff}
button{font-family:inherit;cursor:pointer;transition:all .15s}
@media print{.no-print{display:none!important}body{background:#fff}}
body.dark{background:#0f1117;color:#e2e8f0}
body.dark input,body.dark select,body.dark textarea{background:#1e2333;border-color:#2d3748;color:#e2e8f0}
body.dark input:focus,body.dark select:focus,body.dark textarea:focus{border-color:#4a7fff;background:#252d3d}
</style>

<body>
<div id="root"></div>
<script type="text/babel">

const {useState,useEffect,useRef,useMemo} = React;

// ═══ CONFIG ═══
// Len URL Workera – žiadne heslá ani tokeny!
const WORKER='https://uznesenia-api.jasimko.workers.dev';
let sessionToken=null; // session token dostaneme po prihlásení
let loginAttempts=0,loginLockedUntil=0;
const MONTHS=['Január','Február','Marec','Apríl','Máj','Jún','Júl','August','September','Október','November','December'];
const SY_OPTIONS=['2024/2025','2025/2026','2026/2027','2027/2028'];
const AV_COLORS={blue:'#1E4B8F',green:'#2A9D6F',purple:'#7C3AED',amber:'#D97706',red:'#DC2626'};
const MEET_BG={PR:'#FEF2F2',PP:'#EEF3FC',MZ:'#FFF7ED',PK:'#F5F3FF',VED:'#F0FDF4',RR:'#FDF2F8'};
const MEET_FG={PR:'#DC2626',PP:'#1E4B8F',MZ:'#C2410C',PK:'#6D28D9',VED:'#15803D',RR:'#9D174D'};
const MEET_NAMES={PR:'Pedagogická rada',PP:'Pracovná porada',MZ:'Metodické združenie',PK:'Predmetová komisia',VED:'Vedenie školy',RR:'Rodičovská rada'};

// Dynamické PLAN_MONTHS podľa školského roka
function getPlanMonths(sy){
  const yr=parseInt((sy||'2025/2026').split('/')[0]);
  return [`${yr}-09`,`${yr}-10`,`${yr}-11`,`${yr}-12`,`${yr+1}-01`,`${yr+1}-02`,`${yr+1}-03`,`${yr+1}-04`,`${yr+1}-05`,`${yr+1}-06`];
}
// Aktuálny mesiac z PLAN_MONTHS
function getSyDateRange(sy){
  const yr=parseInt((sy||'2025/2026').split('/')[0]);
  return {from:`${yr}-09-01`, to:`${yr+1}-06-30`};
}
function currentPlanMonth(sy){
  const months=getPlanMonths(sy);
  const now=new Date().toISOString().substring(0,7);
  return months.find(m=>m===now)||months[0];
}

// ═══ API – session token (žiadne heslá v HTML!) ═══
function apiHeaders(){
  return {'Content-Type':'application/json','X-Session-Token':sessionToken||''};
}
async function apiGet(action=''){
  const r=await fetch(WORKER+(action?'?action='+action:''),{headers:apiHeaders()});
  const j=await r.json();
  if(!j.ok) throw new Error(j.error);
  return j.data;
}
async function apiPost(action,payload={}){
  const r=await fetch(WORKER,{method:'POST',headers:apiHeaders(),
    body:JSON.stringify({action,...payload})});
  const j=await r.json();
  if(!j.ok) throw new Error(j.error);
  return j.result;
}
async function apiLogin(uid,pwd,role){
  const r=await fetch(WORKER+'/login',{method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({uid,pwd,role})});

// ═══ HELPERS ═══
function uid(){return 'x'+Date.now()+Math.random().toString(36).slice(2,6)}
function mlabel(k){if(!k)return'';const[y,m]=k.split('-');return(MONTHS[parseInt(m)-1]||'')+' '+y}
function fmtActDate(a){
  if(!a) return '—';
  if(a.dateType==='month') return a.actMonth?mlabel(a.actMonth):'—';
  if(a.dateType==='range'&&a.date&&a.dateTo) return fmtS(a.date)+' – '+fmtS(a.dateTo);
  return a.date?fmtS(a.date):'—';
}
function fmt(d){if(!d)return'';const dt=new Date(d);return isNaN(dt)?d:dt.toLocaleDateString('sk-SK',{day:'numeric',month:'numeric',year:'numeric'})}
function fmtS(d){if(!d)return'';const dt=new Date(d);return isNaN(dt)?d:dt.toLocaleDateString('sk-SK',{day:'numeric',month:'long'})}
function getMembers(type,val,groups){
  if(!type||type==='single') return [val].filter(Boolean);
  if(type==='group'){const g=groups.find(x=>x.id===val);return g&&g.memberIds?g.memberIds.split(',').filter(Boolean):[];}
  if(type==='persons') return (val||'').split(',').filter(Boolean);
  return [];
}
function userName(id,users){const u=users.find(x=>x.id===id);return u?u.name:id}
function respLabel(type,val,users,groups){
  if(type==='group'){const g=groups.find(x=>x.id===val);return g?g.name:val;}
  if(type==='persons') return (val||'').split(',').map(id=>userName(id,users).split(' ').pop()).join(', ');
  return userName(val,users);
}
function taskStatus(t,groups){
  const members=getMembers(t.respType,t.respVal,groups);
  if(!members.length) return 'otvorene';
  const comp=t.completions||{};
  const done=members.filter(id=>comp[id]?.done).length;
  if(done===members.length) return 'splnene';
  if(done>0) return 'ciastocne';
  if(t.taskType==='permanent'||t.taskType==='month') return 'otvorene';
  const now=new Date().toISOString().split('T')[0];
  const dead=t.taskType==='range'?(t.deadTo||''):(t.dead||'');
  if(dead&&dead.substring(0,10)<now) return 'po-termine';
  return 'otvorene';
}
function deadLabel(t,month){
  if(t.taskType==='permanent') return '🔁 Stála úloha';
  if(t.taskType==='month') return '📅 '+mlabel(t.deadMonth||month||'');
  if(t.taskType==='range'&&t.dead&&t.deadTo) return fmt(t.dead)+' – '+fmt(t.deadTo);
  return t.dead?fmt(t.dead):'—';
}

// ═══ LOGIN ═══
function Login({users,config,onLogin}){
  const [uid2,setUid]=useState('');
  const [pwd,setPwd]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const handle=async()=>{
    if(!uid2){setErr('Vyberte meno.');return;}
    if(Date.now()<loginLockedUntil){const s=Math.ceil((loginLockedUntil-Date.now())/1000);setErr(`Príliš veľa pokusov. Počkajte ${s}s.`);return;}
    setLoading(true);
    const selUser=users.find(u=>u.id===uid2);
    const res=await apiLogin(uid2,pwd,selUser?.role||'u');
    setLoading(false);
    if(!res.ok){
      loginAttempts++;
      if(loginAttempts>=5){loginLockedUntil=Date.now()+30000;loginAttempts=0;}
      setErr('Nesprávne heslo.'+(loginAttempts>=3?` (pokus ${loginAttempts}/5)`:''));
      return;
    }
    // Session token uložíme len do pamäte (nie localStorage)
    sessionToken=res.token;
    loginAttempts=0;
    onLogin(uid2);
  };
  return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#1E4B8F 0%,#2A9D6F 100%)',padding:20}}>
    <div className="animate" style={{background:'#fff',borderRadius:20,padding:40,width:'100%',maxWidth:420,boxShadow:'0 24px 64px rgba(0,0,0,.18)'}}>

// ═══ NASTAVENIA MODÁL ═══
function SettingsModal({config,onSave,onClose}){
  const [sy,setSy]=useState(config.sy||'2025/2026');
  const [school,setSchool]=useState(config.school||'');
  const [dir,setDir]=useState(config.dir||'');
  const [saving,setSaving]=useState(false);
  const save=async()=>{setSaving(true);await onSave({sy,school,dir});setSaving(false);onClose();};
  return<Modal title="⚙ Nastavenia" onClose={onClose} maxWidth={440}
    footer={<><Btn onClick={onClose}>Zrušiť</Btn><Btn variant="primary" onClick={save} disabled={saving}>{saving?'Ukladám…':'Uložiť'}</Btn></>}>
    <Field label="Školský rok">
      <select value={sy} onChange={e=>setSy(e.target.value)}>
        {SY_OPTIONS.map(y=><option key={y}>{y}</option>)}
      </select>
    </Field>
    <Field label="Názov školy"><input value={school} onChange={e=>setSchool(e.target.value)} placeholder="ZŠ s MŠ, Višňové 446"/></Field>
    <Field label="Meno riaditeľa/ky"><input value={dir} onChange={e=>setDir(e.target.value)} placeholder="Mgr. Meno Priezvisko"/></Field>
  </Modal>;
}

// ─── NÁHĽAD PLÁNU (Preview Modal) ───
function PlanPreviewModal({month,data,curUser,onClose}){
  const {plans,meetings,tasks,users,groups,config}=data;
  const planMonths=getPlanMonths(config.sy);
  const [selMonth,setSelMonth]=useState(month);
  const pm=plans[selMonth]||{published:false,days:[],activities:[]};
  const monthMeets=meetings.filter(m=>(m.date||'').startsWith(selMonth)).sort((a,b)=>a.date>b.date?1:-1);
  const monthTasks=tasks.filter(t=>{
    if(t.mid==='plan-'+selMonth) return true;
    const m=meetings.find(x=>x.id===t.mid);
    return m&&(m.date||'').startsWith(selMonth);
  });
  const approved=(pm.activities||[]).filter(a=>a.status==='approved').sort((a,b)=>(a.date||'zzz')>(b.date||'zzz')?1:-1);
  const days=(pm.days||[]).sort((a,b)=>a.date>b.date?1:-1);

  const printNow=()=>{
    const w=window.open('','_blank');
    const html=buildPlanHtml(selMonth,{days,monthMeets,approved,monthTasks,users,groups,config});
    w.document.write(html);w.document.close();setTimeout(()=>w.print(),400);
  };

  const {plans,meetings,tasks,users,groups,config}=data;
  const isDir=curUser.role==='r';
  const planMonths=getPlanMonths(config.sy);
  const [month,setMonth]=useState(()=>currentPlanMonth(config.sy));
  const [previewModal,setPreviewModal]=useState(false);
  const [actModal,setActModal]=useState(null); // null | {} | {existing}
  const [dayModal,setDayModal]=useState(false);
  const [taskModal,setTaskModal]=useState(null);
  const [meetModal,setMeetModal]=useState(false);
  const [editMeetModal,setEditMeetModal]=useState(null);
  const [copyPlanModal,setCopyPlanModal]=useState(false);

  const pm=plans[month]||{published:false,days:[],activities:[]};
  const monthMeets=meetings.filter(m=>(m.date||'').startsWith(month)).sort((a,b)=>a.date>b.date?1:-1);
  // Úlohy: z porád v danom mesiaci + priame úlohy plánu (mid='plan-MESIAC')
  const monthTasks=tasks.filter(t=>{
    if(t.mid==='plan-'+month) return true;
    const m=meetings.find(x=>x.id===t.mid);
    return m&&(m.date||'').startsWith(month);
  });
  const approved=(pm.activities||[]).filter(a=>a.status==='approved').sort((a,b)=>(a.date||'zzz')>(b.date||'zzz')?1:-1);
  const pending=(pm.activities||[]).filter(a=>a.status==='pending');
  const days=(pm.days||[]).sort((a,b)=>a.date>b.date?1:-1);

    const w=window.open('','_blank');

    <style>body{font-family:Arial,sans-serif;margin:35px;font-size:12pt}

    <div class="sig"><br/><br/>________________________________<br/>riaditeľ školy</div>

// Priamy TaskModal pre plán (bez väzby na poradu)
function PlanTaskModal({task,month,data,planMonths,onSave,onClose}){
  const {users,groups}=data;
  const isNew=!task.id;
  const [txt,setTxt]=useState(task.txt||'');
  const [cat,setCat]=useState(task.cat||'Pedagogika');
  const [taskType,setTaskType]=useState(task.taskType||'month');
  const [dead,setDead]=useState((task.dead||'').substring(0,10));
  const [deadTo,setDeadTo]=useState((task.deadTo||'').substring(0,10));
  const [deadMonth,setDeadMonth]=useState(task.deadMonth||month);
  const [note,setNote]=useState(task.note||'');
  const [resp,setResp]=useState({type:task.respType||'single',val:task.respVal||users.find(u=>u.role!=='r')?.id||''});
  const [saving,setSaving]=useState(false);
  const save=async()=>{
    if(!txt.trim()) return;
    setSaving(true);
    const cnt=data.tasks.filter(t=>t.mid==='plan-'+month).length+(isNew?1:0);
    await onSave({id:task.id||uid(),mid:'plan-'+month,no:task.no||'P-'+cnt,
      txt:txt.trim(),cat,taskType,dead:taskType==='permanent'||taskType==='month'?'':dead,
      deadTo:taskType==='range'?deadTo:'',deadMonth:taskType==='month'?deadMonth:'',
      note,respType:resp.type,respVal:resp.val,completions:task.completions||{}});
    setSaving(false);
  };
  return<Modal title={isNew?'Nová úloha do plánu':'Upraviť úlohu'} onClose={onClose}
    footer={<><Btn onClick={onClose}>Zrušiť</Btn><Btn variant="primary" onClick={save} disabled={saving}>{saving?'Ukladám…':'Uložiť úlohu'}</Btn></>}>
    <Field label="Text úlohy"><textarea value={txt} onChange={e=>setTxt(e.target.value)} rows={3} placeholder="Popis úlohy…" style={{resize:'vertical'}}/></Field>
    <Field label="Kategória"><select value={cat} onChange={e=>setCat(e.target.value)}>
      {['Pedagogika','Prevádzka','Administratíva','Ostatné'].map(c=><option key={c}>{c}</option>)}
    </select></Field>
    <DateTypeSelector taskType={taskType} setTaskType={setTaskType} dead={dead} setDead={setDead}
      deadTo={deadTo} setDeadTo={setDeadTo} deadMonth={deadMonth} setDeadMonth={setDeadMonth}
      planMonths={planMonths} currentMonth={month}/>
    <Field label="Zodpovedný/í"><RespSelector value={resp} onChange={setResp} users={users} groups={groups}/></Field>
    <Field label="Poznámka"><textarea value={note} onChange={e=>setNote(e.target.value)} rows={2} style={{resize:'vertical'}} placeholder="Voliteľné…"/></Field>
  </Modal>;
}

function ActModal({existing,month,data,curUser,planMonths,onSave,onClose}){
  const {users,groups}=data;
  const isEdit=!!existing?.id;
  const [name,setName]=useState(existing?.name||'');
  const [dateType,setDateType]=useState(existing?.dateType||'exact');
  const [date,setDate]=useState(existing?.date||'');
  const [dateTo,setDateTo]=useState(existing?.dateTo||'');
  const [actMonth,setActMonth]=useState(existing?.actMonth||month);
  const [cls,setCls]=useState(existing?.cls||'');
  const [note,setNote]=useState(existing?.note||'');
  const [selMonth,setSelMonth]=useState(existing?.month||month);
  const [resp,setResp]=useState({type:existing?.respType||'single',val:existing?.respVal||curUser.id});
  const [saving,setSaving]=useState(false);
  const DATE_TYPES=[['exact','📅 Dátum'],['range','📆 Rozsah'],['month','🗓 Mesiac']];

    if(!name) return;
    setSaving(true);
    await onSave({id:existing?.id||'a'+uid(),
      dateType,
      date:dateType==='month'?'':date,
      dateTo:dateType==='range'?dateTo:'',
      actMonth:dateType==='month'?actMonth:'',
      name,cls:cls||'—',respType:resp.type,respVal:resp.val,
      note,status:isEdit?(existing?.status||'approved'):(curUser.role==='r'?'approved':'pending'),month:selMonth});

            borderColor:dateType===k?'#1E4B8F':'#E2E6F0',background:dateType===k?'#EEF3FC':'#fff',
            color:dateType===k?'#1E4B8F':'#4A5278',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>
          {l}
        </button>)}
      </div>
    </Field>
    {dateType==='exact'&&<Row2>
      <Field label="Dátum"><input type="date" value={date} onChange={e=>setDate(e.target.value)}/></Field>
      <Field label="Pre koho (trieda)"><input value={cls} onChange={e=>setCls(e.target.value)} placeholder="9.A, všetci…"/></Field>
    </Row2>}
    {dateType==='range'&&<>
      <Row2>
        <Field label="Dátum od"><input type="date" value={date} onChange={e=>setDate(e.target.value)}/></Field>
        <Field label="Dátum do"><input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)}/></Field>
      </Row2>
      <Field label="Pre koho (trieda)"><input value={cls} onChange={e=>setCls(e.target.value)} placeholder="9.A, všetci…"/></Field>
    </>}
    {dateType==='month'&&<>
      <Field label="Mesiac">
        <select value={actMonth} onChange={e=>setActMonth(e.target.value)}>
          {planMonths.map(k=><option key={k} value={k}>{mlabel(k)}</option>)}
        </select>
      </Field>
      <Field label="Pre koho (trieda)"><input value={cls} onChange={e=>setCls(e.target.value)} placeholder="9.A, všetci…"/></Field>
    </>}
    {dateType!=='exact'&&dateType!=='range'&&dateType!=='month'&&<Field label="Pre koho (trieda)"><input value={cls} onChange={e=>setCls(e.target.value)} placeholder="9.A, všetci…"/></Field>}
    <Field label="Mesiac plánu"><select value={selMonth} onChange={e=>setSelMonth(e.target.value)}>
      {planMonths.map(k=><option key={k} value={k}>{mlabel(k)}</option>)}
    </select></Field>
    <Field label="Zodpovedný/í"><RespSelector value={resp} onChange={setResp} users={users} groups={groups}/></Field>
    <Field label="Poznámka"><textarea value={note} onChange={e=>setNote(e.target.value)} rows={2} style={{resize:'vertical'}}/></Field>
    {curUser.role!=='r'&&!isEdit&&<div style={{background:'#EEF3FC',borderRadius:8,padding:'8px 12px',fontSize:12,color:'#1E4B8F'}}>ℹ️ Aktivita bude odoslaná riaditeľovi na schválenie.</div>}
  </Modal>;
}

// MeetModal – používa sa v pláne aj v sekciách PP/PR
function MeetModal({existing,type,data,planMonths,defaultMonth,onSave,onClose}){
  const allTypes=Object.keys(MEET_NAMES);
  const [selType,setSelType]=useState(existing?.type||type||'PP');
  const [name,setName]=useState(existing?.name||'');
  const [date,setDate]=useState(existing?.date||'');
  const [time,setTime]=useState(existing?.time||'13:30');
  const [place,setPlace]=useState(existing?.place||'');
  const [program,setProgram]=useState(existing?.program||'');
  const [saving,setSaving]=useState(false);
  const isNew=!existing?.id;
  // Aktuálny rok zo školského roka
  const curYr=new Date().getFullYear();
  useEffect(()=>{
    if(isNew){
      const cnt=data.meetings.filter(m=>m.type===selType).length+1;
      setName(`${MEET_NAMES[selType]} ${cnt}/${curYr}`);
    }
  },[selType]);
  const save=async()=>{
    if(!name)return; // dátum nie je povinný
    setSaving(true);
    await onSave({id:existing?.id||uid(),name,date,type:selType,time,place,program});
    setSaving(false);
  };
  return<Modal title={isNew?'Nová porada / zasadnutie':'Upraviť poradu'} onClose={onClose} maxWidth={480}
    footer={<><Btn onClick={onClose}>Zrušiť</Btn><Btn variant="primary" onClick={save} disabled={saving}>{saving?'Ukladám…':'Uložiť'}</Btn></>}>
    {isNew&&<Field label="Typ">
      <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:2}}>
        {allTypes.map(t=><button type="button" key={t} onClick={()=>setSelType(t)} style={{padding:'4px 10px',borderRadius:7,fontSize:12,fontWeight:600,border:'1.5px solid',
          borderColor:selType===t?(MEET_FG[t]||'#1E4B8F'):'#E2E6F0',background:selType===t?(MEET_BG[t]||'#EEF3FC'):'#fff',
          color:selType===t?(MEET_FG[t]||'#1E4B8F'):'#4A5278',cursor:'pointer'}}>
          {t} – {MEET_NAMES[t]}
        </button>)}
      </div>
    </Field>}
    <Field label="Názov"><input value={name} onChange={e=>setName(e.target.value)}/></Field>
    <Row2>
      <Field label="Dátum (nepovinný)"><input type="date" value={date} onChange={e=>setDate(e.target.value)}/></Field>
      <Field label="Čas"><input type="time" value={time} onChange={e=>setTime(e.target.value)}/></Field>
    </Row2>
    <Field label="Poznámka"><input value={place} onChange={e=>setPlace(e.target.value)} placeholder="napr. miesto, téma…"/></Field>

function MeetingView({data,curUser,type,onSaveMeet,onDeleteMeet,onSaveTask,onDeleteTask,onMarkDone,onChangeStatus,toast}){
  const {meetings,tasks,users,groups,config}=data;
  const isDir=curUser.role==='r';
  const planMonths=getPlanMonths(config.sy);
  const {from:syFrom,to:syTo}=getSyDateRange(config.sy);
  const myMeetings=meetings.filter(m=>m.type===type&&(m.date||'')>=syFrom&&(m.date||'')<=syTo).sort((a,b)=>b.date>a.date?1:-1);
  const [selId,setSelId]=useState(myMeetings[0]?.id||null);
  const [meetModal,setMeetModal]=useState(false);
  const [editMeetModal,setEditMeetModal]=useState(null);
  const [confirmDelMeet,setConfirmDelMeet]=useState(null);
  const [copyModal,setCopyModal]=useState(false);
  const [previewModal,setPreviewModal]=useState(false);
  const [taskModal,setTaskModal]=useState(null);
  const [doneModal,setDoneModal]=useState(null);

  const sel=myMeetings.find(m=>m.id===selId)||myMeetings[0]||null;
  const myTasks=sel?tasks.filter(t=>t.mid===sel.id):[];
  const typeName=MEET_NAMES[type]||type;

  const printMeeting=()=>{
    if(!sel) return;
    const w=window.open('','_blank');
    const isPA=type==='PR';
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${typeName}</title>
    <style>body{font-family:Arial,sans-serif;margin:35px;font-size:12pt}
    h1{font-size:15pt;text-align:center;margin-bottom:3px}h3{font-size:11pt;text-align:center;color:#555;margin-bottom:18px}
    h2{font-size:12pt;margin:16px 0 5px;border-bottom:1px solid #000;padding-bottom:2px}
    table{width:100%;border-collapse:collapse;margin-bottom:8px}th,td{border:1px solid #bbb;padding:5px 8px;font-size:11pt}th{background:#eee}
    ol{margin:0 0 0 18px}li{margin-bottom:5px}.sig{margin-top:50px;display:flex;justify-content:space-between}
    .empty{color:#999;font-style:italic}</style></head><body>
    <h1>${typeName}</h1>
    <h3>${config.school||'ZŠ s MŠ, Višňové 446'} · ${fmt(sel.date)}${sel.time?' · '+sel.time:''}</h3>
    ${sel.place?`<p><b>Poznámka:</b> ${sel.place}</p>`:''}
    <h2>Program</h2>
    ${sel.program?`<ol>${(sel.program||'').split('\n').filter(Boolean).map(l=>`<li>${l}</li>`).join('')}</ol>`:'<p class="empty">Bez programu.</p>'}
    <h2>${isPA?'Uznesenia':'Úlohy'}</h2>
    ${myTasks.length?`<table><tr><th>Č.</th><th>${isPA?'Uznesenie':'Úloha'}</th><th>Zodpovedný/á</th><th>Termín</th></tr>${myTasks.map(t=>`<tr><td>${t.no||'—'}</td><td>${t.txt}${t.note?'<br/><small>'+t.note+'</small>':''}</td><td>${respLabel(t.respType,t.respVal,users,groups)}</td><td>${deadLabel(t,'')}</td></tr>`).join('')}</table>`:'<p class="empty">Žiadne.</p>'}
    <div class="sig">
      <div><br/><br/>________________________________<br/>Zapisovateľ/ka</div>
      <div><br/><br/>________________________________<br/>riaditeľ školy</div>
    </div></body></html>`;
    w.document.write(html);w.document.close();setTimeout(()=>w.print(),400);
  };

  return<div className="animate">
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
      <div style={{fontSize:18,fontWeight:700,display:'flex',alignItems:'center',gap:8}}>
        <span style={{background:MEET_BG[type]||'#EEF3FC',color:MEET_FG[type]||'#1E4B8F',padding:'3px 10px',borderRadius:7,fontSize:14,fontWeight:700}}>{type}</span>
        {typeName}
      </div>
      <div style={{display:'flex',gap:7}}>
        {/* Riaditeľ: tlač + zverejniť | Učiteľ: náhľad len keď je zverejnené */}
        {isDir&&sel&&<Btn size="sm" onClick={printMeeting}>🖨 Tlačiť / PDF</Btn>}
        {isDir&&sel&&<Btn size="sm" variant={sel.published?'outline':'green'} onClick={()=>onSaveMeet({...sel,published:!sel.published})}>
          {sel.published?'🔒 Skryť':'📢 Zverejniť'}
        </Btn>}
        {!isDir&&sel&&sel.published&&<Btn size="sm" variant="outline" onClick={()=>setPreviewModal(true)}>👁 Náhľad / Tlač</Btn>}
        {isDir&&sel&&<Btn size="sm" variant="amber" onClick={()=>setCopyModal(true)}>📋 Kopírovať</Btn>}
        {isDir&&sel&&<Btn size="sm" onClick={()=>setEditMeetModal(sel)}>✎ Upraviť</Btn>}
        {isDir&&sel&&<Btn size="sm" variant="red" onClick={()=>setConfirmDelMeet(sel.id)}>🗑 Vymazať</Btn>}
        {isDir&&<Btn size="sm" variant="green" onClick={()=>setMeetModal(true)}>+ Nová</Btn>}
      </div>
    </div>

    {!myMeetings.length&&<div style={{textAlign:'center',padding:'60px 0',color:'#8892B0'}}>

// ═══ KOPÍROVANIE PORADY ═══
function CopyMeetModal({source,sourceTasks,type,data,onSaveMeet,onSaveTask,onClose,toast}){
  const {meetings,config}=data;
  const planMonths=getPlanMonths(config.sy);
  const typeName=MEET_NAMES[type]||type;
  const [copyProgram,setCopyProgram]=useState(true);
  const [copyTasks,setCopyTasks]=useState(true);
  const [resetDone,setResetDone]=useState(true);
  const [name,setName]=useState('');
  const [date,setDate]=useState('');
  const [time,setTime]=useState(source.time||'13:30');
  const [place,setPlace]=useState(source.place||'zborovňa');
  const [saving,setSaving]=useState(false);

  useEffect(()=>{
    const cnt=meetings.filter(m=>m.type===type).length+1;
    const yr=(config.sy||'2025/2026').split('/')[0];
    setName(`${MEET_NAMES[type]} ${cnt}/${yr}`);
  },[]);

  const save=async()=>{
    if(!name||!date){toast('Vyplňte názov a dátum.','err');return;}
    setSaving(true);
    const newMeet={id:uid(),name,date,type,time,place,
      program:copyProgram?source.program:''};
    await onSaveMeet(newMeet);
    if(copyTasks&&sourceTasks.length){
      for(const t of sourceTasks){
        const newTask={...t,id:uid(),mid:newMeet.id,
          completions:resetDone?{}:t.completions};
        await onSaveTask(newTask);
      }
    }
    setSaving(false);
    toast(`Skopírované do "${name}" ✓`,'ok');
    onClose();
  };

  return<Modal title={`📋 Kopírovať ${typeName.toLowerCase()}`} onClose={onClose} maxWidth={500}
    footer={<><Btn onClick={onClose}>Zrušiť</Btn><Btn variant="green" onClick={save} disabled={saving}>{saving?'Kopírujem…':'📋 Kopírovať'}</Btn></>}>
    <div style={{background:'#EEF3FC',borderRadius:10,padding:'11px 14px',marginBottom:14,fontSize:13}}>
      <div style={{fontWeight:700,color:'#1E4B8F',marginBottom:3}}>Zdroj: {source.name}</div>
      <div style={{color:'#4A5278',fontSize:12}}>📅 {fmt(source.date)} · {sourceTasks.length} {type==='PR'?'uznesení':'úloh'}</div>
    </div>
    <div style={{marginBottom:14}}>
      <div style={{fontSize:12,fontWeight:700,color:'#4A5278',marginBottom:8,textTransform:'uppercase',letterSpacing:'.04em'}}>Čo kopírovať</div>
      {[
        [copyProgram,setCopyProgram,'Program porady'],
        [copyTasks,setCopyTasks,type==='PR'?'Uznesenia':'Úlohy'],
      ].map(([val,set,lbl],i)=><div key={i} onClick={()=>set(!val)} style={{display:'flex',alignItems:'center',gap:9,padding:'8px 10px',borderRadius:9,border:'1.5px solid',borderColor:val?'#1E4B8F':'#E2E6F0',background:val?'#EEF3FC':'#F8FAFD',cursor:'pointer',marginBottom:6}}>
        <input type="checkbox" checked={val} onChange={e=>set(e.target.checked)} onClick={e=>e.stopPropagation()} style={{width:15,height:15,accentColor:'#1E4B8F'}}/>
        <span style={{fontSize:13,fontWeight:600,color:val?'#1E4B8F':'#4A5278'}}>{lbl}</span>
        {i===1&&val&&<div onClick={e=>e.stopPropagation()} style={{display:'flex',alignItems:'center',gap:6,marginLeft:'auto',fontSize:12,color:'#8892B0',cursor:'pointer'}} onClick={e=>{e.stopPropagation();setResetDone(r=>!r);}}>
          <input type="checkbox" checked={resetDone} onChange={e=>setResetDone(e.target.checked)} onClick={e=>e.stopPropagation()} style={{accentColor:'#1E4B8F'}}/>
          Resetovať splnenie
        </div>}
      </div>)}
    </div>
    <div style={{fontSize:12,fontWeight:700,color:'#4A5278',marginBottom:8,textTransform:'uppercase',letterSpacing:'.04em'}}>Nová porada</div>
    <Field label="Názov"><input value={name} onChange={e=>setName(e.target.value)}/></Field>
    <Row2>
      <Field label="Dátum"><input type="date" value={date} onChange={e=>setDate(e.target.value)}/></Field>
      <Field label="Čas"><input type="time" value={time} onChange={e=>setTime(e.target.value)}/></Field>
    </Row2>
    <Field label="Miesto"><input value={place} onChange={e=>setPlace(e.target.value)}/></Field>
  </Modal>;
}

// ═══ KOPÍROVANIE PLÁNU ═══
function CopyPlanModal({sourceMonth,sourcePlan,sourceTasks,data,onSaveMeet,onSaveTask,onSaveDay,onSaveAct,onClose,toast}){
  const {meetings,plans,config}=data;
  const planMonths=getPlanMonths(config.sy);
  const {days=[],activities=[]}=sourcePlan||{};
  const approvedActs=activities.filter(a=>a.status==='approved');
  const monthMeets=meetings.filter(m=>(m.date||'').startsWith(sourceMonth));
  const [copyDays,setCopyDays]=useState(true);
  const [copyMeets,setCopyMeets]=useState(true);
  const [copyActs,setCopyActs]=useState(true);
  const [copyTasks,setCopyTasks]=useState(true);
  const [resetDone,setResetDone]=useState(true);
  const [targetMonth,setTargetMonth]=useState(planMonths.find(m=>m!==sourceMonth)||planMonths[0]);
  const [saving,setSaving]=useState(false);

  const save=async()=>{
    setSaving(true);
    const offset=targetMonth!==sourceMonth?(new Date(targetMonth+'-15').getTime()-new Date(sourceMonth+'-15').getTime()):0;
    const shiftDate=d=>{if(!d)return d;try{const dt=new Date(d);dt.setTime(dt.getTime()+offset);return dt.toISOString().split('T')[0];}catch{return d;}};

    if(copyDays) for(const d of days) await onSaveDay({...d,id:'d'+uid(),month:targetMonth,date:shiftDate(d.date)});
    if(copyMeets) for(const m of monthMeets){
      const nm={...m,id:uid(),date:shiftDate(m.date)};
      await onSaveMeet(nm);
      if(copyTasks){
        const mTasks=sourceTasks.filter(t=>t.mid===m.id);
        for(const t of mTasks) await onSaveTask({...t,id:uid(),mid:nm.id,completions:resetDone?{}:t.completions});
      }
    }
    if(copyActs) for(const a of approvedActs) await onSaveAct({...a,id:'a'+uid(),month:targetMonth,date:shiftDate(a.date),status:'approved'});
    if(copyTasks){
      const directTasks=sourceTasks.filter(t=>t.mid==='plan-'+sourceMonth);
      for(const t of directTasks) await onSaveTask({...t,id:uid(),mid:'plan-'+targetMonth,deadMonth:t.deadMonth?targetMonth:t.deadMonth,completions:resetDone?{}:t.completions});
    }
    setSaving(false);
    toast(`Plán ${mlabel(sourceMonth)} skopírovaný do ${mlabel(targetMonth)} ✓`,'ok');
    onClose();
  };

  const items=[
    [copyDays,setCopyDays,`A/ Sviatky (${days.length})`],
    [copyMeets,setCopyMeets,`B/ Porady (${monthMeets.length})`],
    [copyActs,setCopyActs,`C/ Aktivity (${approvedActs.length})`],
    [copyTasks,setCopyTasks,`D/ Úlohy (${sourceTasks.filter(t=>t.mid==='plan-'+sourceMonth||monthMeets.some(m=>m.id===t.mid)).length})`],
  ];

  return<Modal title="📋 Kopírovať plán mesiaca" onClose={onClose} maxWidth={500}
    footer={<><Btn onClick={onClose}>Zrušiť</Btn><Btn variant="green" onClick={save} disabled={saving}>{saving?'Kopírujem…':'📋 Kopírovať'}</Btn></>}>
    <div style={{background:'#EEF3FC',borderRadius:10,padding:'11px 14px',marginBottom:14,fontSize:13}}>
      <div style={{fontWeight:700,color:'#1E4B8F'}}>Zdroj: Plán na {mlabel(sourceMonth)}</div>
    </div>
    <div style={{marginBottom:14}}>
      <div style={{fontSize:12,fontWeight:700,color:'#4A5278',marginBottom:8,textTransform:'uppercase',letterSpacing:'.04em'}}>Čo kopírovať</div>
      {items.map(([val,set,lbl],i)=><div key={i} onClick={()=>set(!val)} style={{display:'flex',alignItems:'center',gap:9,padding:'8px 10px',borderRadius:9,border:'1.5px solid',borderColor:val?'#1E4B8F':'#E2E6F0',background:val?'#EEF3FC':'#F8FAFD',cursor:'pointer',marginBottom:6}}>
        <input type="checkbox" checked={val} onChange={e=>set(e.target.checked)} onClick={e=>e.stopPropagation()} style={{width:15,height:15,accentColor:'#1E4B8F'}}/>
        <span style={{fontSize:13,fontWeight:600,color:val?'#1E4B8F':'#4A5278'}}>{lbl}</span>
        {i===3&&val&&<div onClick={e=>e.stopPropagation()} style={{display:'flex',alignItems:'center',gap:6,marginLeft:'auto',fontSize:12,color:'#8892B0',cursor:'pointer'}} onClick={e=>{e.stopPropagation();setResetDone(r=>!r);}}>
          <input type="checkbox" checked={resetDone} onChange={e=>setResetDone(e.target.checked)} onClick={e=>e.stopPropagation()} style={{accentColor:'#1E4B8F'}}/>
          Resetovať splnenie
        </div>}
      </div>)}
      <div style={{fontSize:11,color:'#8892B0',marginTop:6,padding:'0 4px'}}>💡 Dátumy sa automaticky posunú na cieľový mesiac.</div>
    </div>
    <Field label="Kopírovať do mesiaca">
      <select value={targetMonth} onChange={e=>setTargetMonth(e.target.value)}>
        {planMonths.filter(m=>m!==sourceMonth).map(k=><option key={k} value={k}>{mlabel(k)}</option>)}
      </select>
    </Field>
  </Modal>;
}

function ProgramEditor({sel,onSave}){

function FullTaskModal({task,meetId,type,data,planMonths,onSave,onClose}){
  const {meetings,users,groups}=data;
  const isNew=!task.id;
  const [txt,setTxt]=useState(task.txt||'');
  const [cat,setCat]=useState(task.cat||'Pedagogika');
  const [mid,setMid]=useState(task.mid||meetId||meetings[0]?.id||'');
  const [taskType,setTaskType]=useState(task.taskType||'normal');
  const [dead,setDead]=useState((task.dead||'').substring(0,10));
  const [deadTo,setDeadTo]=useState((task.deadTo||'').substring(0,10));
  const [deadMonth,setDeadMonth]=useState(task.deadMonth||planMonths[0]||'');
  const [note,setNote]=useState(task.note||'');
  const [resp,setResp]=useState({type:task.respType||'single',val:task.respVal||users.find(u=>u.role!=='r')?.id||''});
  const [saving,setSaving]=useState(false);
  const typeMeetings=type?meetings.filter(m=>m.type===type):meetings;
  const meetList=typeMeetings.length?typeMeetings:meetings;
  const save=async()=>{
    if(!txt.trim()) return;
    setSaving(true);
    const m=meetings.find(x=>x.id===mid);
    const cnt=data.tasks.filter(t=>t.mid===mid).length+(isNew?1:0);
    await onSave({id:task.id||uid(),mid,no:task.no||(m?.type||type||'U')+'-'+cnt,
      txt:txt.trim(),cat,taskType,
      dead:taskType==='permanent'||taskType==='month'?'':dead,
      deadTo:taskType==='range'?deadTo:'',
      deadMonth:taskType==='month'?deadMonth:'',
      note,respType:resp.type,respVal:resp.val,completions:task.completions||{}});
    setSaving(false);
  };
  const lbl=type==='PR'?'uznesenie':'úlohu';
  return<Modal title={isNew?`Nové ${lbl}`:`Upraviť ${lbl}`} onClose={onClose}
    footer={<><Btn onClick={onClose}>Zrušiť</Btn><Btn variant="primary" onClick={save} disabled={saving}>{saving?'Ukladám…':`Uložiť ${lbl}`}</Btn></>}>
    <Field label="Text"><textarea value={txt} onChange={e=>setTxt(e.target.value)} rows={3} style={{resize:'vertical'}}/></Field>
    <Row2>
      <Field label="Kategória"><select value={cat} onChange={e=>setCat(e.target.value)}>
        {['Pedagogika','Prevádzka','Administratíva','Ostatné'].map(c=><option key={c}>{c}</option>)}
      </select></Field>
      <Field label="Porada"><select value={mid} onChange={e=>setMid(e.target.value)}>
        {meetList.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
      </select></Field>
    </Row2>
    <DateTypeSelector taskType={taskType} setTaskType={setTaskType} dead={dead} setDead={setDead}
      deadTo={deadTo} setDeadTo={setDeadTo} deadMonth={deadMonth} setDeadMonth={setDeadMonth}
      planMonths={planMonths} currentMonth={planMonths[0]}/>
    <Field label="Zodpovedný/í"><RespSelector value={resp} onChange={setResp} users={users} groups={groups}/></Field>
    <Field label="Poznámka"><textarea value={note} onChange={e=>setNote(e.target.value)} rows={2} style={{resize:'vertical'}} placeholder="Voliteľné…"/></Field>
  </Modal>;
}

function DoneModal({task,onSave,onClose}){
  const [note,setNote]=useState('');
  const [saving,setSaving]=useState(false);
  return<Modal title="Označiť ako splnené" onClose={onClose} maxWidth={440}
    footer={<><Btn onClick={onClose}>Zrušiť</Btn><Btn variant="green" disabled={saving} onClick={async()=>{setSaving(true);await onSave(note);}}>✓ Splniť</Btn></>}>
    <div style={{fontSize:14,fontWeight:600,marginBottom:10}}>{task.txt}</div>
    <Field label="Komentár (voliteľné)"><textarea value={note} onChange={e=>setNote(e.target.value)} rows={3} style={{resize:'vertical'}} placeholder="Popis ako bola úloha splnená…"/></Field>
  </Modal>;
}

function DarkToggle({dark,setDark}){
  const toggle=()=>{
    const nd=!dark;
    setDark(nd);
    document.body.classList.toggle('dark',nd);
    try{localStorage.setItem('skolaDark',nd?'1':'0');}catch{}
  };
  return<button type="button" onClick={toggle} title={dark?'Svetlý režim':'Tmavý režim'}
    style={{width:34,height:34,borderRadius:8,border:'1.5px solid',display:'flex',alignItems:'center',justifyContent:'center',
      borderColor:dark?'#4a7fff':'#E2E6F0',background:dark?'#1e2333':'#F8FAFD',cursor:'pointer',fontSize:16,transition:'all .2s'}}>
    {dark?'☀️':'🌙'}
  </button>;
}
// Barvy pre dark/light režim
function dk(dark,light,d){return dark?d:light;}

  useEffect(()=>{document.body.classList.toggle('dark',dark);},[]);

  const showToast=(msg,type='inf')=>setToast({msg,type});

  useEffect(()=>{
    (async()=>{
      try{const d=await apiGet('init');setData(d);setStatus('login');}
      catch(e){
        showToast('Chyba pripojenia: '+e.message,'err');
        setTimeout(()=>{setData({config:{sy:'2025/2026',school:'ZŠ s MŠ Višňové 446',dir:'Mgr. Ján Šimko'},users:[],groups:[],meetings:[],tasks:[],plans:{}});setStatus('login');},2000);
      }
    })();
  },[]);

  const handleLogin=id=>{const u=data.users.find(x=>x.id===id);setCurUser(u);setStatus('app');};

  // ─── OPTIMISTICKÉ API AKCIE – UI first, API na pozadí ───
  const saveTask=t=>{
    setData(d=>({...d,tasks:d.tasks.find(x=>x.id===t.id)?d.tasks.map(x=>x.id===t.id?t:x):[...d.tasks,t]}));
    return apiPost('saveTask',{data:t}).catch(e=>showToast('Chyba ukladania: '+e.message,'err'));
  };
  const deleteTask=id=>{
    setData(d=>({...d,tasks:d.tasks.filter(t=>t.id!==id)}));
    return apiPost('deleteTask',{id}).catch(e=>showToast('Chyba: '+e.message,'err'));
  };
  const deleteMeeting=id=>{
    setData(d=>({...d,meetings:d.meetings.filter(m=>m.id!==id),tasks:d.tasks.filter(t=>t.mid!==id)}));
    return apiPost('deleteMeeting',{id}).catch(e=>showToast('Chyba: '+e.message,'err'));
  };
  const changeTaskStatus=(taskId,manualStatus)=>{
    setData(d=>({...d,tasks:d.tasks.map(t=>t.id===taskId?{...t,manualStatus}:t)}));
    // Uložíme celú úlohu so statusom
    const task=data.tasks.find(t=>t.id===taskId);
    if(task) apiPost('saveTask',{data:{...task,manualStatus}}).catch(e=>showToast('Chyba: '+e.message,'err'));
  };
  const saveMeeting=m=>{
    setData(d=>({...d,meetings:d.meetings.find(x=>x.id===m.id)?d.meetings.map(x=>x.id===m.id?m:x):[...d.meetings,m]}));
    return apiPost('saveMeeting',{data:m}).catch(e=>showToast('Chyba: '+e.message,'err'));
  };
  const markDone=(taskId,uid2,note)=>{
    const comp={done:true,note,date:new Date().toISOString().split('T')[0]};
    setData(d=>({...d,tasks:d.tasks.map(t=>t.id===taskId?{...t,completions:{...t.completions,[uid2]:comp}}:t)}));
    return apiPost('updateCompletion',{taskId,uid:uid2,done:true,note}).catch(e=>showToast('Chyba: '+e.message,'err'));
  };
  const saveActivity=act=>{
    setData(d=>{const plans={...d.plans};
      if(!plans[act.month])plans[act.month]={published:false,days:[],activities:[]};
      const existing=plans[act.month].activities.findIndex(a=>a.id===act.id);
      plans[act.month]={...plans[act.month],activities:existing>=0
        ?plans[act.month].activities.map(a=>a.id===act.id?act:a)
        :[...plans[act.month].activities,act]};
      return{...d,plans};});
    return apiPost('saveActivity',{data:act}).catch(e=>showToast('Chyba: '+e.message,'err'));
  };
  const deleteActivity=(id,month)=>{
    setData(d=>{const plans={...d.plans};if(plans[month])plans[month]={...plans[month],activities:plans[month].activities.filter(a=>a.id!==id)};return{...d,plans};});
    return apiPost('deleteActivity',{id,month}).catch(e=>showToast('Chyba: '+e.message,'err'));
  };
  const approveActivity=(id,month,approve)=>{
    const status=approve?'approved':'rejected';
    setData(d=>{const plans={...d.plans};if(plans[month])plans[month]={...plans[month],activities:approve?plans[month].activities.map(a=>a.id===id?{...a,status}:a):plans[month].activities.filter(a=>a.id!==id)};return{...d,plans};});
    showToast(approve?'Schválené ✓':'Zamietnuté.',approve?'ok':'inf');
    return apiPost('updateActivityStatus',{id,month,status}).catch(e=>showToast('Chyba: '+e.message,'err'));
  };
  const saveDay=day=>{
    setData(d=>{const plans={...d.plans};if(!plans[day.month])plans[day.month]={published:false,days:[],activities:[]};
      plans[day.month]={...plans[day.month],days:[...plans[day.month].days.filter(x=>x.id!==day.id),day]};return{...d,plans};});
    return apiPost('saveDay',{data:day}).catch(e=>showToast('Chyba: '+e.message,'err'));
  };
  const deleteDay=(id,month)=>{
    setData(d=>{const plans={...d.plans};if(plans[month])plans[month]={...plans[month],days:plans[month].days.filter(x=>x.id!==id)};return{...d,plans};});
    return apiPost('deleteDay',{id,month}).catch(e=>showToast('Chyba: '+e.message,'err'));
  };
  const publishPlan=(month,pub)=>{
    setData(d=>{const plans={...d.plans};if(plans[month])plans[month]={...plans[month],published:pub};return{...d,plans};});
    showToast(pub?'Plán zverejnený! 📢':'Zverejnenie zrušené.',pub?'ok':'inf');
    return apiPost('publishPlan',{month,published:pub}).catch(e=>showToast('Chyba: '+e.message,'err'));
  };
  const saveConfig=async cfg=>{
    await apiPost('saveConfig',{data:cfg});
    setData(d=>({...d,config:{...d.config,...cfg}}));
    showToast('Nastavenia uložené.','ok');
  };

  if(status==='loading') return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#1E4B8F,#2A9D6F)'}}>
    <div style={{background:'#fff',borderRadius:20,padding:40,textAlign:'center',boxShadow:'0 24px 64px rgba(0,0,0,.18)'}}>
      <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>Školský manažér</div><Spinner/>
      <div style={{fontSize:13,color:'#8892B0',marginTop:12}}>Pripájam sa…</div>
    </div>
  </div>;

  if(status==='login'||!curUser) return<>
    {data&&<Login users={data.users||[]} config={data.config||{}} onLogin={handleLogin}/>}
    {toast&&<Toast {...toast} onClose={()=>setToast(null)}/>}
  </>;

  const isDir=curUser.role==='r';
  const navItems=[{k:'plan',icon:'📅',label:'Plán na mesiac'},{k:'pp',icon:'📋',label:'Pracovná porada'},{k:'pr',icon:'🎓',label:'Pedagogická rada'}];

          </div>
          Školský manažér
          <span style={{fontWeight:400,color:'#8892B0',fontSize:12}}>{data.config.school||'ZŠ s MŠ, Višňové 446'}</span>

          {isDir&&<Btn size="sm" variant="ghost" onClick={()=>setSettingsOpen(true)}>⚙ Nastavenia</Btn>}
          <div style={{display:'flex',alignItems:'center',gap:7,fontSize:13,fontWeight:500,color:'#4A5278'}}>
            <Avatar uid={curUser.id} users={data.users} size={30}/>
            <span>{curUser.name}</span>
            <span style={{fontSize:11,color:'#8892B0'}}>({curUser.role==='r'?'Riaditeľ':'Zamestnanec'})</span>
          </div>
          <div style={{width:1,height:24,background:'#E2E6F0'}}/>
          <DarkToggle dark={dark} setDark={setDark}/>
          <Btn size="sm" onClick={()=>{setCurUser(null);setStatus('login');}}>Odhlásiť</Btn>
        </div>
      </header>

      <div style={{display:'flex',flex:1,overflow:'hidden'}}>
        <nav className="no-print" style={{width:220,background:'#fff',borderRight:'1px solid #E2E6F0',display:'flex',flexDirection:'column',padding:'16px 0',flexShrink:0}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:'.08em',color:'#8892B0',padding:'0 18px 8px',textTransform:'uppercase'}}>Hlavné sekcie</div>
          {navItems.map(({k,icon,label})=>{
            const on=view===k;
            return<div key={k} onClick={()=>setView(k)} style={{display:'flex',alignItems:'center',gap:9,padding:'10px 18px',fontSize:13,fontWeight:on?700:500,
              color:on?'#1E4B8F':'#4A5278',cursor:'pointer',borderLeft:`3px solid ${on?'#1E4B8F':'transparent'}`,background:on?'#EEF3FC':'transparent',transition:'all .15s'}}
              onMouseEnter={e=>{if(!on){e.currentTarget.style.background='#F8FAFD';e.currentTarget.style.color='#1E4B8F';}}}
              onMouseLeave={e=>{if(!on){e.currentTarget.style.background='';e.currentTarget.style.color='#4A5278';}}}>
              <span style={{fontSize:16}}>{icon}</span>{label}
            </div>;
          })}
          <div style={{marginTop:'auto',padding:'14px 16px',borderTop:'1px solid #E2E6F0'}}>
            <div style={{fontSize:10,fontWeight:700,color:'#8892B0',letterSpacing:'.05em',textTransform:'uppercase',marginBottom:7}}>Nasledujúca porada</div>
            {(()=>{const today=new Date().toISOString().split('T')[0];
              const next=[...data.meetings].filter(m=>m.date>=today).sort((a,b)=>a.date>b.date?1:-1)[0];
              return next?<><div style={{fontSize:12,fontWeight:700,color:'#1E4B8F'}}>{fmt(next.date)}</div><div style={{fontSize:12,color:'#4A5278'}}>{next.name}</div></>:<div style={{fontSize:12,color:'#8892B0'}}>—</div>;
            })()}
          </div>
        </nav>

        <main style={{flex:1,overflowY:'auto',padding:22}}>
          {view==='plan'&&<PlanView data={data} curUser={curUser}
            onSaveMeet={saveMeeting} onSaveTask={saveTask} onDeleteTask={deleteTask}
            onSaveAct={saveActivity} onDeleteAct={deleteActivity} onApproveAct={approveActivity}
            onSaveDay={saveDay} onDeleteDay={deleteDay} onPublish={publishPlan} onMarkDone={markDone} onChangeStatus={changeTaskStatus} toast={showToast}/>}
          {view==='pp'&&<MeetingView data={data} curUser={curUser} type="PP"
            onSaveMeet={saveMeeting} onDeleteMeet={deleteMeeting} onSaveTask={saveTask} onDeleteTask={deleteTask} onMarkDone={markDone} onChangeStatus={changeTaskStatus} toast={showToast}/>}
          {view==='pr'&&<MeetingView data={data} curUser={curUser} type="PR"
            onSaveMeet={saveMeeting} onDeleteMeet={deleteMeeting} onSaveTask={saveTask} onDeleteTask={deleteTask} onMarkDone={markDone} onChangeStatus={changeTaskStatus} toast={showToast}/>}
        </main>
      </div>
    </div>

    {settingsOpen&&<SettingsModal config={data.config} onSave={saveConfig} onClose={()=>setSettingsOpen(false)}/>}
    {toast&&<Toast {...toast} onClose={()=>setToast(null)}/>}
  </>;
